<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktikum Bootstrap</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

    <div class="container">
        <h1 class="text-center mt-4">Praktikum Bootstrap</h1>
    </div>

    <!-- Bootstrap Grid -->
    <div class="container mt-5">
        <h3>Bootstrap Grid</h3>

        <div class="row">
            <div class="col-12 col-md-8 bg-primary text-white">col-12 col-md-8</div>
            <div class="col-6 col-md-4 bg-warning">col-6 col-md-4</div>
        </div>

        <div class="row mt-2">
            <div class="col-6 col-md-4 bg-success text-white">col-6</div>
            <div class="col-6 col-md-4 bg-danger text-white">col-6</div>
            <div class="col-6 col-md-4 bg-info">col-6</div>
        </div>

        <div class="row mt-2">
            <div class="col-6 bg-secondary text-white">col-6</div>
            <div class="col-6 bg-dark text-white">col-6</div>
        </div>

    </div>

    <!-- Bootstrap Table -->
    <div class="container mt-5">
        <h3>Bootstrap Table</h3>

        <table class="table table-hover">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Nama Lengkap</th>
                    <th>Asal Kota</th>
                    <th>Umur</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <th>1</th>
                    <td>Budi Rojadi</td>
                    <td>Semarang</td>
                    <td>35 th</td>
                </tr>

                <tr>
                    <th>2</th>
                    <td>Yulia Santi</td>
                    <td>Bekasi</td>
                    <td>32</td>
                </tr>

                <tr>
                    <th>3</th>
                    <td>Fahri Abdilah</td>
                    <td>Medan</td>
                    <td>38 th</td>
                </tr>

            </tbody>
        </table>
    </div>

    <!-- Bootstrap Image -->
    <div class="container mt-5">
        <h3>Bootstrap Image</h3>

        <img src="https://picsum.photos/300" class="img-thumbnail">
        <br><br>
        <img src="https://picsum.photos/800/300" class="img-fluid">

    </div>

    <!-- Bootstrap Button -->
    <div class="container mt-5">
        <h3>Bootstrap Button</h3>

        <button class="btn btn-secondary">Secondary</button>
        <button class="btn btn-primary btn-lg">Primary</button>
        <button class="btn btn-success w-100">Success</button>
        <button class="btn btn-info btn-sm">Info</button>
        <button class="btn btn-warning">Warning</button>
        <button class="btn btn-danger">Danger</button>
        <button class="btn btn-link">Link</button>

    </div>

    <!-- Bootstrap Form -->
    <div class="container mt-5 mb-5">
        <h3>Bootstrap Form</h3>

        <form>
            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">Username</label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" placeholder="Enter username">
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">Password</label>
                <div class="col-sm-10">
                    <input type="password" class="form-control" placeholder="Enter password">
                </div>
            </div>

            <div class="row">
                <div class="col-sm-10 offset-sm-2">
                    <button class="btn btn-success">Submit</button>
                </div>
            </div>

        </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
