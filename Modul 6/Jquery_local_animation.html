<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jquery Local Animation</title>
    <script type="text/javascript" src="jquery-4.0.0.js"></script>
    <script>
        $(document).ready(function(){
            $("button").click(function(){
                $("div").animate({
                    height: 'toggle'
                })
            })
        })
    </script>
</head>

<body>
    <p>click the button multiple times to toggle the animation.</p>
    <button>Start Animation</button>
    <p>By default, all HTML elements have a static position, and cannot be moved.
        To manipulate the position, remember to first set the CSS position property of
        the element to relative, fixed, or absolute!</p>
    <div style="background: aqua; height: 100px; width:100px; position:absolute;"></div>
</body>

</html>
