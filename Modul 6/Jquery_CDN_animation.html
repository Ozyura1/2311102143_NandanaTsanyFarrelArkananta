<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jquery CDN Animation</title>
    <script src="https://code.jquery.com/jquery-4.0.0.js"
        integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
        <script>
            $(document).ready(function(){
                $("button").click(function(){
                    $("div").animate({
                        height: 'toggle'
                    })
                })
            })
        </script>
</head>
<body>
<p>click the button multiple times to toggle the animation.</p>
    <button>Start Animation</button>
    <p>By default, all HTML elements have a static position, and cannot be moved.
        To manipulate the position, remember to first set the CSS position property of
        the element to relative, fixed, or absolute!</p>
        <div style="background: #FFB090; height: 100px; width:100px;"></div>
</body>
</html>
